<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CtrlC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      background: rgba(10, 10, 10, 0.95);
      color: #00ff00;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 0, 0.2);
      overflow: hidden;
      user-select: none;
    }

    #search-bar {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0, 255, 0, 0.15);
      background: rgba(0, 0, 0, 0.5);
    }

    #search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: #00ff00;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    #search-bar input::placeholder {
      color: rgba(0, 255, 0, 0.4);
    }

    #search-bar .search-icon {
      margin-right: 8px;
      opacity: 0.5;
      font-size: 12px;
    }

    #shortcut-hint {
      font-size: 10px;
      color: rgba(0, 255, 0, 0.4);
      margin-left: 8px;
      white-space: nowrap;
    }

    #clip-list {
      max-height: 300px;
      overflow-y: auto;
      overflow-anchor: none;
    }

    #clip-list::-webkit-scrollbar {
      width: 4px;
    }

    #clip-list::-webkit-scrollbar-track {
      background: transparent;
    }

    #clip-list::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 0, 0.3);
      border-radius: 2px;
    }

    .clip-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0, 255, 0, 0.08);
      cursor: pointer;
      transition: background 0.1s;
    }

    .clip-item:hover, .clip-item.selected {
      background: rgba(0, 255, 0, 0.12);
    }

    .clip-item.selected {
      border-left: 2px solid #00ff00;
    }

    .clip-index {
      width: 24px;
      text-align: center;
      font-size: 11px;
      color: rgba(0, 255, 0, 0.5);
      flex-shrink: 0;
    }

    .clip-preview {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: #00ff00;
    }

    .clip-preview img {
      max-height: 32px;
      max-width: 80px;
      border-radius: 3px;
    }

    .clip-type-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 3px;
      /* default (TEXT and friends): the green theme */
      background: rgba(0, 255, 0, 0.15);
      color: rgba(0, 255, 0, 0.85);
      border: 1px solid rgba(0, 255, 0, 0.35);
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* Phosphor companions to the green theme: amber for markup,
       magenta (green's complement) for images — maximally distinct hues. */
    .clip-type-badge.badge-html {
      background: rgba(255, 176, 0, 0.15);
      color: rgba(255, 191, 0, 0.95);
      border-color: rgba(255, 176, 0, 0.4);
    }

    .clip-type-badge.badge-image {
      background: rgba(255, 80, 255, 0.15);
      color: rgba(255, 130, 255, 0.95);
      border-color: rgba(255, 80, 255, 0.4);
    }

    .clip-empty {
      text-align: center;
      padding: 24px;
      color: rgba(0, 255, 0, 0.3);
      font-size: 12px;
    }

    #status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 12px;
      border-top: 1px solid rgba(0, 255, 0, 0.15);
      background: rgba(0, 0, 0, 0.5);
      font-size: 10px;
      color: rgba(0, 255, 0, 0.4);
    }

    .status-key {
      margin-right: 12px;
    }

    .status-key kbd {
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid rgba(0, 255, 0, 0.2);
      border-radius: 2px;
      padding: 1px 4px;
      font-family: inherit;
      font-size: 9px;
    }

    #context-menu {
      position: fixed;
      z-index: 20;
      min-width: 110px;
      background: rgba(5, 5, 5, 0.98);
      border: 1px solid rgba(0, 255, 0, 0.3);
      border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
      padding: 4px 0;
    }

    #context-menu.hidden { display: none; }

    .menu-item {
      padding: 6px 14px;
      font-size: 12px;
      color: #00ff00;
      cursor: pointer;
    }

    .menu-item:hover { background: rgba(0, 255, 0, 0.12); }

    .menu-item.disabled {
      color: rgba(0, 255, 0, 0.25);
      cursor: default;
    }

    .menu-item.disabled:hover { background: transparent; }

    .menu-item.danger { color: #ff5c5c; }
    .menu-item.danger:hover { background: rgba(255, 60, 60, 0.12); }

    #edit-view {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      background: rgba(10, 10, 10, 0.98);
      padding: 10px;
    }

    #edit-view.hidden { display: none; }

    #edit-textarea {
      flex: 1;
      background: rgba(0, 255, 0, 0.05);
      border: 1px solid rgba(0, 255, 0, 0.25);
      border-radius: 4px;
      color: #00ff00;
      font-family: inherit;
      font-size: 12px;
      padding: 8px;
      resize: none;
      outline: none;
    }

    #edit-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    #edit-actions button {
      background: rgba(0, 255, 0, 0.08);
      border: 1px solid rgba(0, 255, 0, 0.3);
      border-radius: 3px;
      color: #00ff00;
      font-family: inherit;
      font-size: 12px;
      padding: 4px 14px;
      cursor: pointer;
    }

    #edit-actions button:hover { background: rgba(0, 255, 0, 0.18); }

    #edit-hint {
      flex: 1;
      align-self: center;
      font-size: 10px;
      color: rgba(0, 255, 0, 0.4);
    }
  </style>
</head>
<body>
  <div id="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search clipboard..." autocomplete="off">
    <span id="shortcut-hint">Esc to dismiss</span>
  </div>

  <div id="clip-list"></div>

  <div id="status-bar">
    <div>
      <span class="status-key"><kbd>1-5</kbd> copy</span>
      <span class="status-key"><kbd>↑↓</kbd> select</span>
      <span class="status-key"><kbd>Del</kbd> remove</span>
    </div>
    <div id="clip-count"></div>
  </div>

  <div id="context-menu" class="hidden">
    <div class="menu-item" id="menu-edit">Edit</div>
    <div class="menu-item danger" id="menu-delete">Delete</div>
  </div>

  <div id="edit-view" class="hidden">
    <textarea id="edit-textarea" spellcheck="false"></textarea>
    <div id="edit-actions">
      <span id="edit-hint">Ctrl+Enter to save · Esc to cancel</span>
      <button id="edit-save">Save</button>
      <button id="edit-cancel">Cancel</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
