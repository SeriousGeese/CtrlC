<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CtrlC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      background: rgba(10, 10, 10, 0.95);
      color: #00ff00;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 0, 0.2);
      overflow: hidden;
      user-select: none;
    }

    #search-bar {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0, 255, 0, 0.15);
      background: rgba(0, 0, 0, 0.5);
    }

    #search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: #00ff00;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    #search-bar input::placeholder {
      color: rgba(0, 255, 0, 0.4);
    }

    #search-bar .search-icon {
      margin-right: 8px;
      opacity: 0.5;
      font-size: 12px;
    }

    #shortcut-hint {
      font-size: 10px;
      color: rgba(0, 255, 0, 0.4);
      margin-left: 8px;
      white-space: nowrap;
    }

    #clip-list {
      max-height: 300px;
      overflow-y: auto;
    }

    #clip-list::-webkit-scrollbar {
      width: 4px;
    }

    #clip-list::-webkit-scrollbar-track {
      background: transparent;
    }

    #clip-list::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 0, 0.3);
      border-radius: 2px;
    }

    .clip-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0, 255, 0, 0.08);
      cursor: pointer;
      transition: background 0.1s;
    }

    .clip-item:hover, .clip-item.selected {
      background: rgba(0, 255, 0, 0.12);
    }

    .clip-item.selected {
      border-left: 2px solid #00ff00;
    }

    .clip-index {
      width: 24px;
      text-align: center;
      font-size: 11px;
      color: rgba(0, 255, 0, 0.5);
      flex-shrink: 0;
    }

    .clip-preview {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: #00ff00;
    }

    .clip-preview img {
      max-height: 32px;
      max-width: 80px;
      border-radius: 3px;
    }

    .clip-type-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(0, 255, 0, 0.15);
      color: rgba(0, 255, 0, 0.7);
      flex-shrink: 0;
      margin-left: 8px;
    }

    .clip-empty {
      text-align: center;
      padding: 24px;
      color: rgba(0, 255, 0, 0.3);
      font-size: 12px;
    }

    #status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 12px;
      border-top: 1px solid rgba(0, 255, 0, 0.15);
      background: rgba(0, 0, 0, 0.5);
      font-size: 10px;
      color: rgba(0, 255, 0, 0.4);
    }

    .status-key {
      margin-right: 12px;
    }

    .status-key kbd {
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid rgba(0, 255, 0, 0.2);
      border-radius: 2px;
      padding: 1px 4px;
      font-family: inherit;
      font-size: 9px;
    }
  </style>
</head>
<body>
  <div id="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search clipboard..." autocomplete="off">
    <span id="shortcut-hint">Esc to dismiss</span>
  </div>

  <div id="clip-list"></div>

  <div id="status-bar">
    <div>
      <span class="status-key"><kbd>1-5</kbd> copy</span>
      <span class="status-key"><kbd>↑↓</kbd> select</span>
    </div>
    <div id="clip-count"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
